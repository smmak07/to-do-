<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Ultimate To-Do List</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --danger-color: #dc3545;
            --success-color: #28a745;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .todo-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            color: #222;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 20px;
            border: none;
            background-color: var(--primary-color);
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background-color: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        li.completed .task-text {
            text-decoration: line-through;
            color: #888888;
        }

        .task-text {
            flex: 1;
            cursor: pointer;
            word-break: break-word;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .btn-action {
            padding: 6px 10px;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn-complete {
            background-color: var(--success-color);
        }

        .btn-delete {
            background-color: var(--danger-color);
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>📝 To-Do List</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off">
            <button id="addBtn">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        // Load tasks from LocalStorage on page load
        let savedTasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function saveToLocalStorage() {
            localStorage.setItem('tasks', JSON.stringify(savedTasks));
        }

        function renderTasks() {
            taskList.innerHTML = '';
            savedTasks.forEach((task, index) => {
                const li = document.createElement('li');
                if (task.completed) li.classList.add('completed');

                li.innerHTML = `
                    <span class="task-text" onclick="toggleTask(${index})">${task.text}</span>
                    <div class="actions">
                        <button class="btn-action btn-complete" onclick="toggleTask(${index})">✓</button>
                        <button class="btn-action btn-delete" onclick="deleteTask(${index})">✕</button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;

            savedTasks.push({ text: text, completed: false });
            taskInput.value = '';
            
            saveToLocalStorage();
            renderTasks();
        }

        function toggleTask(index) {
            savedTasks[index].completed = !savedTasks[index].completed;
            saveToLocalStorage();
            renderTasks();
        }

        function deleteTask(index) {
            savedTasks.splice(index, 1);
            saveToLocalStorage();
            renderTasks();
        }

        // Event listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Initial render
        renderTasks();
    </script>
</body>
</html>
